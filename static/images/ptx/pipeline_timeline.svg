<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="JetBrains Mono,Consolas,monospace">
<rect width="780" height="520" fill="#0f1117" rx="8"/>
<text x="20" y="45" fill="#c9cdd6" font-size="14" font-weight="bold">Naive: Synchronous Load → Compute</text>
<text x="20" y="63" fill="#8b90a0" font-size="10">Each iteration waits for the previous to finish completely</text>
<text x="20" y="100" fill="#8b90a0" font-size="10">MEM unit</text>
<text x="20" y="140" fill="#8b90a0" font-size="10">SM (ALU)</text>
<line x1="100" y1="115" x2="720" y2="115" stroke="#2a2d3a" stroke-dasharray="2,4"/>
<rect x="100" y="87" width="100" height="24" fill="#4477AA" rx="3" opacity="0.8"/>
<text x="150" y="103" text-anchor="middle" fill="white" font-size="10">LOAD 0</text>
<rect x="100" y="123" width="100" height="24" fill="#2a2d3a" rx="3" opacity="0.4"/>
<text x="150" y="139" text-anchor="middle" fill="#CC6677" font-size="9">idle</text>
<rect x="204" y="123" width="110" height="24" fill="#EE7733" rx="3" opacity="0.8"/>
<text x="259" y="139" text-anchor="middle" fill="white" font-size="10">COMPUTE 0</text>
<rect x="204" y="87" width="110" height="24" fill="#2a2d3a" rx="3" opacity="0.4"/>
<text x="259" y="103" text-anchor="middle" fill="#CC6677" font-size="9">idle</text>
<rect x="318" y="87" width="100" height="24" fill="#4477AA" rx="3" opacity="0.8"/>
<text x="368" y="103" text-anchor="middle" fill="white" font-size="10">LOAD 1</text>
<rect x="318" y="123" width="100" height="24" fill="#2a2d3a" rx="3" opacity="0.4"/>
<text x="368" y="139" text-anchor="middle" fill="#CC6677" font-size="9">idle</text>
<rect x="422" y="123" width="110" height="24" fill="#EE7733" rx="3" opacity="0.8"/>
<text x="477" y="139" text-anchor="middle" fill="white" font-size="10">COMPUTE 1</text>
<rect x="422" y="87" width="110" height="24" fill="#2a2d3a" rx="3" opacity="0.4"/>
<text x="477" y="103" text-anchor="middle" fill="#CC6677" font-size="9">idle</text>
<rect x="536" y="87" width="100" height="24" fill="#4477AA" rx="3" opacity="0.8"/>
<text x="586" y="103" text-anchor="middle" fill="white" font-size="10">LOAD 2</text>
<rect x="536" y="123" width="100" height="24" fill="#2a2d3a" rx="3" opacity="0.4"/>
<text x="586" y="139" text-anchor="middle" fill="#CC6677" font-size="9">idle</text>
<rect x="640" y="123" width="110" height="24" fill="#EE7733" rx="3" opacity="0.8"/>
<text x="695" y="139" text-anchor="middle" fill="white" font-size="10">COMPUTE 2</text>
<rect x="640" y="87" width="110" height="24" fill="#2a2d3a" rx="3" opacity="0.4"/>
<text x="695" y="103" text-anchor="middle" fill="#CC6677" font-size="9">idle</text>
<line x1="202" y1="85" x2="202" y2="149" stroke="#CC6677" stroke-width="1" stroke-dasharray="3,2"/>
<text x="202" y="161" text-anchor="middle" fill="#CC6677" font-size="7">sync</text>
<line x1="420" y1="85" x2="420" y2="149" stroke="#CC6677" stroke-width="1" stroke-dasharray="3,2"/>
<text x="420" y="161" text-anchor="middle" fill="#CC6677" font-size="7">sync</text>
<line x1="638" y1="85" x2="638" y2="149" stroke="#CC6677" stroke-width="1" stroke-dasharray="3,2"/>
<text x="638" y="161" text-anchor="middle" fill="#CC6677" font-size="7">sync</text>
<text x="410" y="180" text-anchor="middle" fill="#CC6677" font-size="11">Each hardware unit sits idle ~50% of the time</text>
<text x="20" y="260" fill="#c9cdd6" font-size="14" font-weight="bold">Pipelined: cp.async Double Buffering</text>
<text x="20" y="278" fill="#8b90a0" font-size="10">Load N+1 overlaps with Compute N — both units stay busy</text>
<text x="20" y="315" fill="#8b90a0" font-size="10">MEM unit</text>
<text x="20" y="355" fill="#8b90a0" font-size="10">SM (ALU)</text>
<line x1="100" y1="330" x2="720" y2="330" stroke="#2a2d3a" stroke-dasharray="2,4"/>
<rect x="100" y="302" width="130" height="24" fill="#4477AA" rx="3" opacity="0.8"/>
<text x="165" y="318" text-anchor="middle" fill="white" font-size="10">LOAD 0</text>
<rect x="236" y="302" width="130" height="24" fill="#4477AA" rx="3" opacity="0.8"/>
<text x="301" y="318" text-anchor="middle" fill="white" font-size="10">LOAD 1</text>
<rect x="372" y="302" width="130" height="24" fill="#4477AA" rx="3" opacity="0.8"/>
<text x="437" y="318" text-anchor="middle" fill="white" font-size="10">LOAD 2</text>
<rect x="508" y="302" width="130" height="24" fill="#4477AA" rx="3" opacity="0.8"/>
<text x="573" y="318" text-anchor="middle" fill="white" font-size="10">LOAD 3</text>
<rect x="236" y="338" width="130" height="24" fill="#EE7733" rx="3" opacity="0.8"/>
<text x="301" y="354" text-anchor="middle" fill="white" font-size="10">COMPUTE 0</text>
<rect x="372" y="338" width="130" height="24" fill="#EE7733" rx="3" opacity="0.8"/>
<text x="437" y="354" text-anchor="middle" fill="white" font-size="10">COMPUTE 1</text>
<rect x="508" y="338" width="130" height="24" fill="#EE7733" rx="3" opacity="0.8"/>
<text x="573" y="354" text-anchor="middle" fill="white" font-size="10">COMPUTE 2</text>
<line x1="236" y1="300" x2="236" y2="364" stroke="#44AA99" stroke-width="1" stroke-dasharray="3,2"/>
<text x="236" y="376" text-anchor="middle" fill="#44AA99" font-size="7">wait+sync</text>
<line x1="372" y1="300" x2="372" y2="364" stroke="#44AA99" stroke-width="1" stroke-dasharray="3,2"/>
<text x="372" y="376" text-anchor="middle" fill="#44AA99" font-size="7">wait+sync</text>
<line x1="508" y1="300" x2="508" y2="364" stroke="#44AA99" stroke-width="1" stroke-dasharray="3,2"/>
<text x="508" y="376" text-anchor="middle" fill="#44AA99" font-size="7">wait+sync</text>
<path d="M165 364 L165 380" stroke="#8b90a0" stroke-width="1" fill="none" marker-end="none"/>
<text x="165" y="392" text-anchor="middle" fill="#8b90a0" font-size="9">prime pipeline</text>
<rect x="236" y="298" width="130" height="68" fill="#44AA99" rx="4" opacity="0.06"/>
<text x="301" y="383" text-anchor="middle" fill="#44AA99" font-size="9">overlap</text>
<text x="410" y="405" text-anchor="middle" fill="#44AA99" font-size="11">Both units active simultaneously — memory latency hidden</text>
<rect x="60" y="470" width="660" height="36" fill="#181b25" rx="6" stroke="#2a2d3a"/>
<text x="390" y="485" text-anchor="middle" fill="#EE7733" font-size="11" font-weight="bold">cp.async.commit_group + cp.async.wait_group N</text>
<text x="390" y="499" text-anchor="middle" fill="#8b90a0" font-size="10">PTX gives you explicit control over which groups to wait for</text>
</svg>