<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="JetBrains Mono,Consolas,monospace">
<rect width="780" height="420" fill="#0f1117" rx="8"/>
<text x="390" y="28" text-anchor="middle" fill="#c9cdd6" font-size="15" font-weight="bold">Cache Behavior: Default vs Streaming Hints</text>
<text x="160" y="55" text-anchor="middle" fill="#6699CC" font-size="12" font-weight="bold">Default: ld.global.f32</text>
<rect x="60" y="70" width="200" height="36" fill="#AA77DD" rx="5" opacity="0.85" />
<text x="160" y="92" text-anchor="middle" fill="white" font-size="10">SM Registers</text>
<rect x="60" y="130" width="200" height="36" fill="#4477AA" rx="5" opacity="0.85" />
<text x="160" y="144" text-anchor="middle" fill="white" font-size="10" font-weight="bold">L1 Cache</text>
<text x="160" y="158" text-anchor="middle" fill="white" font-size="8" opacity="0.7">per-SM, 128KB</text>
<rect x="60" y="190" width="200" height="36" fill="#4477AA" rx="5" opacity="0.85" />
<text x="160" y="204" text-anchor="middle" fill="white" font-size="10" font-weight="bold">L2 Cache</text>
<text x="160" y="218" text-anchor="middle" fill="white" font-size="8" opacity="0.7">shared, 72MB</text>
<rect x="60" y="260" width="200" height="72" fill="#181b25" rx="5" opacity="0.85" stroke="#2a2d3a" stroke-width="1.5"/>
<text x="160" y="292" text-anchor="middle" fill="white" font-size="10" font-weight="bold">DRAM (HBM)</text>
<text x="160" y="306" text-anchor="middle" fill="white" font-size="8" opacity="0.7">24GB, ~1 TB/s</text>
<line x1="160" y1="260" x2="160" y2="220" stroke="#4477AA" stroke-width="1.5"/>
<polygon points="160,226 164.0,234.0 156.0,234.0" fill="#4477AA"/>
<text x="170.0" y="243.0" fill="#4477AA" font-size="8">stream data</text>
<line x1="160" y1="190" x2="160" y2="160" stroke="#4477AA" stroke-width="1.5"/>
<polygon points="160,166 164.0,174.0 156.0,174.0" fill="#4477AA"/>
<text x="170.0" y="178.0" fill="#4477AA" font-size="8">fills L1</text>
<line x1="160" y1="130" x2="160" y2="100" stroke="#4477AA" stroke-width="1.5"/>
<polygon points="160,106 164.0,114.0 156.0,114.0" fill="#4477AA"/>
<rect x="275" y="190" width="100" height="36" fill="#CC6677" rx="5" opacity="0.3" stroke="#CC6677" stroke-dasharray="4,2"/>
<text x="325" y="205" text-anchor="middle" fill="#CC6677" font-size="9">hot lookup</text>
<text x="325" y="218" text-anchor="middle" fill="#CC6677" font-size="9">table</text>
<text x="325" y="240" text-anchor="middle" fill="#CC6677" font-size="8">evicted by</text>
<text x="325" y="252" text-anchor="middle" fill="#CC6677" font-size="8">stream data!</text>
<text x="540" y="55" text-anchor="middle" fill="#FFAA66" font-size="12" font-weight="bold">Streaming: ld.global.cs.f32</text>
<rect x="440" y="70" width="200" height="36" fill="#AA77DD" rx="5" opacity="0.85" />
<text x="540" y="92" text-anchor="middle" fill="white" font-size="10">SM Registers</text>
<rect x="440" y="130" width="200" height="36" fill="#181b25" rx="5" opacity="0.85" stroke="#2a2d3a" stroke-width="1.5"/>
<text x="540" y="144" text-anchor="middle" fill="white" font-size="10" font-weight="bold">L1 Cache</text>
<text x="540" y="158" text-anchor="middle" fill="white" font-size="8" opacity="0.7">bypassed</text>
<rect x="440" y="190" width="200" height="36" fill="#EE7733" rx="5" opacity="0.85" />
<text x="540" y="204" text-anchor="middle" fill="white" font-size="10" font-weight="bold">L2 Cache</text>
<text x="540" y="218" text-anchor="middle" fill="white" font-size="8" opacity="0.7">early eviction flag</text>
<rect x="440" y="260" width="200" height="72" fill="#181b25" rx="5" opacity="0.85" stroke="#2a2d3a" stroke-width="1.5"/>
<text x="540" y="292" text-anchor="middle" fill="white" font-size="10" font-weight="bold">DRAM (HBM)</text>
<text x="540" y="306" text-anchor="middle" fill="white" font-size="8" opacity="0.7">24GB, ~1 TB/s</text>
<line x1="540" y1="260" x2="540" y2="220" stroke="#EE7733" stroke-width="1.5"/>
<polygon points="540,226 544.0,234.0 536.0,234.0" fill="#EE7733"/>
<text x="550.0" y="243.0" fill="#EE7733" font-size="8">stream data</text>
<path d="M540 190 Q660 150 540 106" fill="none" stroke="#EE7733" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="650" y="148" fill="#EE7733" font-size="8">skip L1</text>
<polygon points="540,106 536,114 544,114" fill="#EE7733"/>
<rect x="655" y="190" width="100" height="36" fill="#44AA99" rx="5" opacity="0.3" stroke="#44AA99"/>
<text x="705" y="205" text-anchor="middle" fill="#44AA99" font-size="9">hot lookup</text>
<text x="705" y="218" text-anchor="middle" fill="#44AA99" font-size="9">table</text>
<text x="705" y="240" text-anchor="middle" fill="#44AA99" font-size="8">stays in L2!</text>
<text x="540" y="335" text-anchor="middle" fill="#FFAA66" font-size="10">st.global.wt — write-through, no L2 allocation</text>
<rect x="40" y="370" width="700" height="40" fill="#181b25" rx="6" stroke="#2a2d3a"/>
<text x="390" y="386" text-anchor="middle" fill="#c9cdd6" font-size="11">When stream data >> L2 size, default loads evict hot working set</text>
<text x="390" y="402" text-anchor="middle" fill="#8b90a0" font-size="10">ld.cs marks stream data for early eviction — hot data stays cached</text>
</svg>