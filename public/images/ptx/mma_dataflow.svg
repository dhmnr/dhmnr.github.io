<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 600" font-family="JetBrains Mono,Consolas,monospace">
<rect width="780" height="600" fill="#0f1117" rx="8"/>
<text x="390" y="28" text-anchor="middle" fill="#c9cdd6" font-size="15" font-weight="bold">Attention Data Flow: WMMA vs PTX mma</text>
<text x="190" y="55" text-anchor="middle" fill="#6699CC" font-size="13" font-weight="bold">WMMA Path</text>
<rect x="50" y="70" width="230" height="40" fill="#AA77DD" rx="5" opacity="0.85" />
<text x="165" y="85" text-anchor="middle" fill="white" font-size="11" font-weight="bold">MMA #1: Q @ K^T</text>
<text x="165" y="100" text-anchor="middle" fill="white" font-size="9" opacity="0.7">wmma::mma_sync</text>
<line x1="165" y1="110" x2="165" y2="134" stroke="#CC6677" stroke-width="1.5"/>
<polygon points="165,140 161,132 169,132" fill="#CC6677"/>
<text x="173" y="129" fill="#CC6677" font-size="8">~30 cycles</text>
<rect x="50" y="140" width="230" height="48" fill="#CC6677" rx="5" opacity="0.85" stroke="#CC6677" stroke-width="1.5"/>
<text x="165" y="159" text-anchor="middle" fill="white" font-size="11" font-weight="bold">STORE to Shared Memory</text>
<text x="165" y="174" text-anchor="middle" fill="white" font-size="9" opacity="0.7">wmma::store_matrix_sync</text>
<line x1="165" y1="188" x2="165" y2="207" stroke="#CC6677" stroke-width="1.5"/>
<polygon points="165,213 161,205 169,205" fill="#CC6677"/>
<rect x="50" y="213" width="230" height="28" fill="#181b25" rx="5" opacity="0.85" stroke="#CC6677" stroke-width="1.5"/>
<text x="165" y="231" text-anchor="middle" fill="white" font-size="11">__syncthreads()</text>
<line x1="165" y1="241" x2="165" y2="260" stroke="#8b90a0" stroke-width="1.5"/>
<polygon points="165,266 161,258 169,258" fill="#8b90a0"/>
<rect x="50" y="266" width="230" height="40" fill="#44AA99" rx="5" opacity="0.85" />
<text x="165" y="281" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Row-wise Softmax</text>
<text x="165" y="296" text-anchor="middle" fill="white" font-size="9" opacity="0.7">in shared memory</text>
<line x1="165" y1="306" x2="165" y2="325" stroke="#8b90a0" stroke-width="1.5"/>
<polygon points="165,331 161,323 169,323" fill="#8b90a0"/>
<rect x="50" y="331" width="230" height="32" fill="#181b25" rx="5" opacity="0.85" />
<text x="165" y="351" text-anchor="middle" fill="white" font-size="11">float → half conversion</text>
<line x1="165" y1="363" x2="165" y2="382" stroke="#CC6677" stroke-width="1.5"/>
<polygon points="165,388 161,380 169,380" fill="#CC6677"/>
<rect x="50" y="388" width="230" height="28" fill="#181b25" rx="5" opacity="0.85" stroke="#CC6677" stroke-width="1.5"/>
<text x="165" y="406" text-anchor="middle" fill="white" font-size="11">__syncthreads()</text>
<line x1="165" y1="416" x2="165" y2="435" stroke="#CC6677" stroke-width="1.5"/>
<polygon points="165,441 161,433 169,433" fill="#CC6677"/>
<text x="173" y="432" fill="#CC6677" font-size="8">~30 cycles</text>
<rect x="50" y="441" width="230" height="48" fill="#CC6677" rx="5" opacity="0.85" stroke="#CC6677" stroke-width="1.5"/>
<text x="165" y="460" text-anchor="middle" fill="white" font-size="11" font-weight="bold">RELOAD from Shared Memory</text>
<text x="165" y="475" text-anchor="middle" fill="white" font-size="9" opacity="0.7">wmma::load_matrix_sync</text>
<line x1="165" y1="489" x2="165" y2="508" stroke="#8b90a0" stroke-width="1.5"/>
<polygon points="165,514 161,506 169,506" fill="#8b90a0"/>
<rect x="50" y="514" width="230" height="40" fill="#AA77DD" rx="5" opacity="0.85" />
<text x="165" y="529" text-anchor="middle" fill="white" font-size="11" font-weight="bold">MMA #2: softmax @ V</text>
<text x="165" y="544" text-anchor="middle" fill="white" font-size="9" opacity="0.7">wmma::mma_sync</text>
<line x1="32" y1="140" x2="32" y2="441" stroke="#CC6677" stroke-width="1.5"/>
<line x1="32" y1="140" x2="38" y2="140" stroke="#CC6677" stroke-width="1.5"/>
<line x1="32" y1="441" x2="38" y2="441" stroke="#CC6677" stroke-width="1.5"/>
<text x="27" y="290" text-anchor="middle" fill="#CC6677" font-size="9" transform="rotate(-90 27 290)">shared mem round-trip</text>
<text x="615" y="55" text-anchor="middle" fill="#FFAA66" font-size="13" font-weight="bold">PTX mma Path</text>
<rect x="500" y="70" width="230" height="40" fill="#AA77DD" rx="5" opacity="0.85" />
<text x="615" y="85" text-anchor="middle" fill="white" font-size="11" font-weight="bold">MMA #1: Q @ K^T</text>
<text x="615" y="100" text-anchor="middle" fill="white" font-size="9" opacity="0.7">mma.sync.aligned PTX</text>
<line x1="615" y1="110" x2="615" y2="134" stroke="#EE7733" stroke-width="1.5"/>
<polygon points="615,140 611,132 619,132" fill="#EE7733"/>
<text x="623" y="129" fill="#EE7733" font-size="8">4 .f32 regs/thread</text>
<rect x="500" y="140" width="230" height="105" fill="#44AA99" rx="5" opacity="0.85" stroke="#44AA99" stroke-width="1.5"/>
<text x="615" y="196" text-anchor="middle" fill="white" font-size="11"></text>
<text x="615" y="154" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Register Softmax</text>
<text x="515" y="172" fill="#c9cdd6" font-size="9">1. Local max: fmaxf(C[0..3])</text>
<text x="515" y="186" fill="#c9cdd6" font-size="9">2. Warp max: shfl_xor_sync</text>
<text x="515" y="200" fill="#c9cdd6" font-size="9">3. exp(C[i] - max)</text>
<text x="515" y="214" fill="#c9cdd6" font-size="9">4. Warp sum: shfl_xor_sync</text>
<text x="515" y="228" fill="#c9cdd6" font-size="9">5. C[i] /= sum</text>
<text x="720" y="240" text-anchor="end" fill="#44AA99" font-size="8">all in .f32 regs</text>
<line x1="615" y1="245" x2="615" y2="264" stroke="#EE7733" stroke-width="1.5"/>
<polygon points="615,270 611,262 619,262" fill="#EE7733"/>
<rect x="500" y="270" width="230" height="32" fill="#181b25" rx="5" opacity="0.85" />
<text x="615" y="290" text-anchor="middle" fill="white" font-size="11">Pack f32 → half2 in regs</text>
<line x1="615" y1="302" x2="615" y2="321" stroke="#EE7733" stroke-width="1.5"/>
<polygon points="615,327 611,319 619,319" fill="#EE7733"/>
<rect x="500" y="327" width="230" height="40" fill="#AA77DD" rx="5" opacity="0.85" />
<text x="615" y="342" text-anchor="middle" fill="white" font-size="11" font-weight="bold">MMA #2: softmax @ V</text>
<text x="615" y="357" text-anchor="middle" fill="white" font-size="9" opacity="0.7">mma.sync.aligned PTX</text>
<line x1="742" y1="120" x2="742" y2="357" stroke="#44AA99" stroke-width="1" stroke-dasharray="3,3"/>
<text x="747" y="238" fill="#44AA99" font-size="9" transform="rotate(-90 747 238)">registers only — no shared mem</text>
<rect x="40" y="584" width="700" height="45" fill="#181b25" rx="6" stroke="#2a2d3a"/>
<text x="195" y="602" text-anchor="middle" fill="#6699CC" font-size="11">WMMA: 8 steps, 2 syncs, ~60+ cycle penalty</text>
<text x="195" y="618" text-anchor="middle" fill="#8b90a0" font-size="10">Fragment layout unknown → must use shared mem</text>
<text x="585" y="602" text-anchor="middle" fill="#EE7733" font-size="11">PTX: 4 steps, 0 syncs, all in registers</text>
<text x="585" y="618" text-anchor="middle" fill="#8b90a0" font-size="10">Thread-to-element layout documented in PTX ISA</text>
<line x1="390" y1="590" x2="390" y2="623" stroke="#2a2d3a"/>
</svg>